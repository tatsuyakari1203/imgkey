name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag, for example v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}"
          }
          if (-not $version.StartsWith("v")) {
            $version = "v$version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "asset_name=ImgKey-$version-windows-x64.exe" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify source
        shell: pwsh
        run: |
          python smoke_test.py
          python -m py_compile app.py keyer.py smoke_test.py ai_assist.py
          python -c "import app, keyer; print('import ok')"

      - name: Build ImgKey.exe
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean ImgKey.spec
          if (-not (Test-Path -LiteralPath "dist\ImgKey.exe")) {
            throw "dist\ImgKey.exe was not produced"
          }
          Copy-Item -LiteralPath "dist\ImgKey.exe" -Destination "dist\${{ steps.release.outputs.asset_name }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.asset_name }}
          path: dist/${{ steps.release.outputs.asset_name }}
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          name: ImgKey ${{ steps.release.outputs.version }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: dist/${{ steps.release.outputs.asset_name }}
