name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag, for example v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}"
          }
          if (-not $version.StartsWith("v")) {
            $version = "v$version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "asset_name=ImgKey-$version-windows-x64.exe" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify source
        shell: pwsh
        run: |
          .\native\imgkey_gpu\build.ps1 -Clean
          if (-not (Test-Path -LiteralPath "native\imgkey_gpu\build\imgkey_gpu.dll")) {
            throw "native\imgkey_gpu\build\imgkey_gpu.dll was not produced"
          }
          python smoke_test.py
          python -m gpu_runtime --probe --json --no-kernel-smoke
          $compileFiles = @(
            "app.py", "keyer.py", "smoke_test.py", "gpu_runtime.py", "screen_analysis.py",
            "gpu_accel.py", "gpu_backend.py", "native_toolchain.py",
            "packaging/pyinstaller/rthooks/imgkey_cuda_runtime.py"
          )
          $compileFiles += Get-ChildItem -Path "imgkey_engine", "ui" -Filter "*.py" | ForEach-Object { $_.FullName }
          python -m py_compile @compileFiles
          python -c "import app, keyer; print('import ok')"
          python -c "import sys, app, keyer, gpu_accel, gpu_backend, gpu_runtime, native_toolchain, screen_analysis; blocked={'torch','torchvision','trans'+'formers','timm','kornia','einops','accelerate','hugging'+'face_hub','safe'+'tensors','skimage','onnxruntime','onnxruntime_gpu','cupy','pyopencl','pymatting','scipy','numba'}; loaded=sorted(m for m in blocked if m in sys.modules); assert not loaded, f'blocked optional/heavy modules imported at default startup: {loaded}'; print('default dependency fence ok')"

      - name: Build ImgKey.exe
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean ImgKey.spec
          if (-not (Test-Path -LiteralPath "dist\ImgKey.exe")) {
            throw "dist\ImgKey.exe was not produced"
          }
          $blockedPath = @("NVIDIA GPU Computing Toolkit", "Microsoft Visual Studio", "Windows Kits", "MSVC", "VulkanSDK", "DXC", "FXC")
          $pathParts = @($env:PATH -split [IO.Path]::PathSeparator | Where-Object { $_ })
          $sanitizedPath = @($pathParts | Where-Object { $part = $_; -not ($blockedPath | Where-Object { $part -like "*$_*" }) }) -join [IO.Path]::PathSeparator
          $probeInfo = [System.Diagnostics.ProcessStartInfo]::new()
          $probeInfo.FileName = (Resolve-Path -LiteralPath "dist\ImgKey.exe").Path
          $probeInfo.WorkingDirectory = (Resolve-Path -LiteralPath ".").Path
          $probeInfo.UseShellExecute = $false
          $probeInfo.RedirectStandardOutput = $true
          $probeInfo.RedirectStandardError = $true
          $probeInfo.Environment["PATH"] = $sanitizedPath
          foreach ($key in @($probeInfo.Environment.Keys)) {
            if ($key -like "CUDA_PATH*" -or $key -in @("CUDA_HOME", "CUDAToolkit_ROOT", "VSINSTALLDIR", "VCINSTALLDIR", "VCToolsInstallDir", "VCToolsRedistDir", "VULKAN_SDK", "VK_SDK_PATH")) {
              $probeInfo.Environment.Remove($key) | Out-Null
            }
          }
          foreach ($arg in @("--gpu-probe", "--json", "--no-kernel-smoke")) {
            $probeInfo.ArgumentList.Add($arg) | Out-Null
          }
          $probe = [System.Diagnostics.Process]::Start($probeInfo)
          $probeStdout = $probe.StandardOutput.ReadToEnd()
          $probeStderr = $probe.StandardError.ReadToEnd()
          $probe.WaitForExit()
          $probeStdout
          if ($probeStderr) { $probeStderr }
          if ($probe.ExitCode -ne 0) {
            throw "dist\ImgKey.exe probe failed with exit code $($probe.ExitCode)"
          }
          $probeJson = $probeStdout | ConvertFrom-Json
          $cpu = @($probeJson.backend_registry.backends | Where-Object { $_.id -eq "cpu_fallback" })[0]
          if (-not $cpu.available) {
            throw "dist\ImgKey.exe did not report CPU fallback availability"
          }
          $d3d12 = @($probeJson.backend_registry.backends | Where-Object { $_.id -eq "d3d12_compute" })[0]
          if (-not $d3d12) {
            throw "dist\ImgKey.exe probe did not report the bundled D3D12 backend"
          }
          Copy-Item -LiteralPath "dist\ImgKey.exe" -Destination "dist\${{ steps.release.outputs.asset_name }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImgKey-${{ steps.release.outputs.version }}-windows-x64
          path: |
            dist/${{ steps.release.outputs.asset_name }}
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          name: ImgKey ${{ steps.release.outputs.version }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            dist/${{ steps.release.outputs.asset_name }}
